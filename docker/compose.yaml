services:
  yolo-train:
    user: "${UID}:${GID}"
    build:
      context: ..            
      dockerfile: docker/Dockerfile
    
    container_name: yolo_trainer
    ipc: host
    
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    volumes:
      - ../datasets:/usr/src/datasets  
      - ../runs:/usr/src/app/runs      
      - ../train.py:/usr/src/app/train.py